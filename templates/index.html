<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Predictor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
    text-align:center;
    background:white;
    padding:50px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:500px;
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:30px;
    font-size:18px;
}

a{
    text-decoration:none;
}

button{
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#007bff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0056b3;
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
    <h1>Welcome to Student Performance Predictor</h1>
    <p>Click below to test and predict student maths score</p>

    <a href="/predictdata">
        <button>Start Test</button>
    </a>
</div>

</body>
</html>
