<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Performance Predictor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:500px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
    margin-bottom:5px;
}

input,select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.result{
    margin-top:20px;
    text-align:center;
    font-size:22px;
    color:green;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Student Exam Performance Predictor</h1>

<form action="{{ url_for('predict_datapoint')}}" method="post">

<label>Gender</label>
<select name="gender" required>
<option disabled selected>Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race / Ethnicity</label>
<select name="ethnicity" required>
<option disabled selected>Select Group</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Education</label>
<select name="parental_level_of_education" required>
<option disabled selected>Select</option>
<option value="associate's degree">Associate Degree</option>
<option value="bachelor's degree">Bachelor Degree</option>
<option value="master's degree">Master Degree</option>
<option value="high school">High School</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>

<label>Lunch Type</label>
<select name="lunch" required>
<option disabled selected>Select</option>
<option value="standard">Standard</option>
<option value="free/reduced">Free/Reduced</option>
</select>

<label>Test Preparation</label>
<select name="test_preparation_course" required>
<option disabled selected>Select</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Reading Score</label>
<input type="number" name="reading_score" min="0" max="100" required>

<label>Writing Score</label>
<input type="number" name="writing_score" min="0" max="100" required>

<button type="submit">Predict Maths Score</button>

</form>

<div class="result">
The Prediction is {{results}}
</div>

</div>

</body>
</html>
